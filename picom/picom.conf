# Backend: Use GLX for better performance with modern GPUs
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

# Opacity
active-opacity = 1.0;
inactive-opacity = 0.92;
frame-opacity = 0.7;
opacity-rule = [
    "100:class_g = 'Firefox'",
    "100:class_g = 'mpv'",
    "100:class_g = 'Gimp'"
];

# Fading (smooth transitions like Sway)
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.5;

# VSync (Prevents screen tearing - crucial for X11)
vsync = true;

# Corner rounding (Optional, but looks great)
corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
