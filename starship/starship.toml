# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = '$all'

add_newline = false

palette = "catppuccin_mocha"

[git_metrics]
disabled = false

[git_status]
disabled = false
ahead = 'έΘκ${count}'
diverged = 'έΘΧέΘκ${ahead_count}έΘμ${behind_count}'
behind = 'έΘμ${count}'
windows_starship = 'C:/Program Files/starship/bin/starship.exe'

