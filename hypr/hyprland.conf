# Environment variables
env = XCURSOR_SIZE,14
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,hyprland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct

#source colors
source=~/.config/hypr/mocha.conf

# Default monitor
monitor=,preferred,auto,1

# Status Bar
exec = killall waybar; waybar

# Wallpaper
exec-once = swaybg -i ~/dot_files/wallpaper/wallpaper_clean.jpg

# Execute commamands at launch/
exec = killall swaync; swaync
exec = libinput-gestures-setup stop; libinput-gestures-setup start
#exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = hyprctl setcursor Catppuccin-Mocha-Lavender 24
exec-once = wezterm
exec-once = wl-clip-persist --clipboard both
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store
# exec = swayidle -w remove auto suspension
exec-once = dbus-update-activation-environment --systemd --all
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME
exec-once = /usr/lib/polkit-1/polkit-agent-helper-1
exec-once = /usr/lib/kdeconnectd
exec-once = kdeconnect-indicator

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_model =
    kb_rules =
    numlock_by_default = true
    follow_mouse = 0

    touchpad {
        natural_scroll = yes
        disable_while_typing = false
    }

    sensitivity = 0
}

general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border =  rgb($blueAlpha)
    col.inactive_border = rgba($blueAlpha80)
    layout = dwindle
}

decoration {
    rounding = 5

    blur {
        enabled = true
        size = 4
        passes = 1
        new_optimizations = true
	    noise = 0.03
    }

    dim_inactive = true
    dim_strength = 0.2
    blurls = lockscreen
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba($surface2Alpha40)
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    animation = windows, 1, 7, overshot
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 40, linear, loop
    animation = fade, 1, 7, default
    animation = workspaces, 1, 10, default, slidefade 100%
}

dwindle { 
    pseudotile = true
    preserve_split = true
}

gestures {
    workspace_swipe = on
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

windowrulev2 = opacity 0.8 0.8,class:wezterm
windowrulev2 = opacity 0.8 0.8,class:thunar
windowrulev2 = opacity 0.9 0.9,class:firefox

#Firefox Picture-in-Picture fix :D
windowrulev2 = noborder,class:^(firefox)$,title:^(Picture-in-Picture)$
windowrulev2 = fakefullscreen,class:^(firefox)$,title:^(Firefox)$
windowrulev2 = fakefullscreen,class:^(firefox)$,title:^(Picture-in-Picture)$
windowrulev2 = pin,class:^(firefox)$,title:^(Firefox)$
windowrulev2 = pin,class:^(firefox)$,title:^(Picture-in-Picture)$
windowrulev2 = float,class:^(firefox)$,title:^(Firefox)$
windowrulev2 = float,class:^(firefox)$,title:^(Picture-in-Picture)$

# Fix rules KDE Connect Presentation Pointer
windowrulev2 = nofullscreenrequest, class:org.kdeconnect.daemon
windowrulev2 = float, class:org.kde.kdeconnect.daemon
windowrulev2 = noborder, class:org.kde.kdeconnect.daemon
windowrulev2 = pin, class:org.kde.kdeconnect.daemon
windowrulev2 = size 100% 100%, class:org.kde.kdeconnect.daemon
windowrulev2 = center, class:org.kde.kdeconnect.daemon
windowrulev2 = noshadow, class:org.kde.kdeconnect.daemon
windowrulev2 = noblur, class:org.kde.kdeconnect.daemon

# Misc rules
windowrulev2 = float,size 10% 10%,class:thunar,title:Confirm to replace files
windowrulev2 = float,size 10% 10%,class:thunar,title:File Operation Progress
windowrulev2 = idleinhibit always,fullscreen:1 #Any window that is fullscreen will prevent sleep
windowrulev2 = idleinhibit always,class:teams-for-linux
windowrulev2 = float,title:KDE Connect URL handler
windowrulev2 = float,class:scrcpy
windowrulev2 = pin,class:scrcpy
windowrulev2 = float,class:engrampa,title:Compress
windowrulev2 = float,class:engrampa,title:Decompress
windowrulev2 = fullscreen,class:mpv

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bindr = $mainMod, SPACE, exec, pkill wofi || wofi
bind = $mainMod, RETURN, exec, wezterm
bind = $mainMod, ESCAPE, killactive, 
bind = $mainMod SHIFT, M, exit
bind = $mainMod, C, exec, hyprpicker -f hex -a
bindr = $mainMod, V, exec, pkill wofi || cliphist list | wofi --dmenu --allow-images | cliphist decode | wl-copy 
# I don't this feature, but like the idea of making alerts
#bind = $mainMod, M, exec, if [ $(notify-send -e -w -u critical -A "Power off" -A "Cancel" -i $(busctl get-property org.freedesktop.Accounts /org/freedesktop/Accounts/User$UID org.freedesktop.Accounts.User IconFile | grep -o '".*"' | tr -d '"') "Bye bye?" "Are you sure you want to power off the PC?") -eq 0 ]; then shutdown now; fi
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod, F, togglefloating,
bind = $mainMod, A, fullscreen,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, togglesplit, # dwindle
bind = $mainMod, R, exec, hyprctl reload
# bind = $mainMod, T, exec, hyprctl --batch "keyword general:border_size 5 ; keyword general:gaps_out 0 ; keyword general:gaps_in 0 ; keyword decoration:rounding 0"
bind = $mainMod, G, togglegroup,
bind = $mainMod, W, exec, firefox
# bind = $mainMod, L, exec, swaylock
bind = $mainMod, E, exec, thunar
bind = $mainMod, D, exec, discord 
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = ,code:107, exec, grim - | swappy -f -
bind = ,code:172, exec, playerctl play-pause
bind = ,code:174, exec, playerctl stop
bind = ,code:173, exec, playerctl previous
bind = ,code:171, exec, playerctl next
binde = ,code:232, exec, brightnessctl set 10%-
binde = ,code:233, exec, brightnessctl set 10%+
bind = ,code:121, exec, pamixer -t
binde = ,code:122, exec, pamixer -d 5
binde = ,code:123, exec, pamixer -i 5
bind = ,code:198, exec, pamixer --default-source -t
bind = ALT, tab, cyclenext,
bind = ALT, tab, bringactivetotop,

# Move focus 
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Resize focused window
binde = $mainMod_SHIFT, h, resizeactive, -30 0 
binde = $mainMod_SHIFT, l, resizeactive, 30 0
binde = $mainMod_SHIFT, k, resizeactive, 0 -30
binde = $mainMod_SHIFT, j, resizeactive, 0 30

# Switch focused window location
bind = $mainMod_CTRL, h, swapwindow, l
bind = $mainMod_CTRL, l, swapwindow, r
bind = $mainMod_CTRL, k, swapwindow, u
bind = $mainMod_CTRL, j, swapwindow, d

# Move focused window
bind = $mainMod_ALT, h, movewindow, l
bind = $mainMod_ALT, l, movewindow, r
bind = $mainMod_ALT, k, movewindow, u
bind = $mainMod_ALT, j, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window to a workspace (silent) with mainMod + CTRL + [0-9]
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 3, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow

# Scratchpad term
workspace = special:scratchpad, wezterm, gapsout:50
bind = $mainMod, S, togglespecialworkspace, scratchpad
